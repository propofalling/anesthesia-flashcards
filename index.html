<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#0f1620">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ITE Cards">
  <title>ITE Flashcards</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>try{var t=localStorage.getItem('tl_theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <header class="appbar">
    <div class="appbar-in">
      <button id="backbtn" class="iconbtn backbtn hidden">‹ Back</button>
      <h1 id="bartitle">ITE Flashcards</h1>
      <button id="themebtn" class="iconbtn" aria-label="Toggle light/dark">☀</button>
      <button id="settingsbtn" class="iconbtn" aria-label="Settings">⚙</button>
    </div>
  </header>
  <main class="wrap"><div id="app"></div></main>
  <script src="config.js"></script>
  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
